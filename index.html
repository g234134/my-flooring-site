<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOODSCAPE | 匠心木境 5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&family=Noto+Serif+TC:wght@200;400;700&display=swap');
        :root { --bg: #F0EDE8; --dark: #1A1A1A; --accent: #8C7355; }
        body { font-family: 'Noto Serif TC', serif; background-color: var(--bg); color: var(--dark); }
        .accent-font { font-family: 'Bodoni Moda', serif; }
        
        /* 100設計美學：錯位陰影與框線 */
        .photo-frame { position: relative; }
        .photo-frame::after { content: ''; position: absolute; top: 20px; left: 20px; width: 100%; height: 100%; border: 1px solid var(--dark); opacity: 0.1; z-index: -1; }
        
        /* 高級動效：平滑遮罩開啟 */
        .reveal-mask { clip-path: inset(0 100% 0 0); transition: clip-path 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .aos-animate .reveal-mask { clip-path: inset(0 0 0 0); }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="app">
        <nav class="fixed top-0 w-full z-50 px-12 py-10 flex justify-between items-center mix-blend-difference text-white">
            <div class="text-2xl font-bold tracking-[0.5em] accent-font italic">WS.</div>
            <div class="space-x-12 text-[10px] tracking-[0.4em] font-light uppercase">
                <a href="#about" class="hover:opacity-40 transition">The Story</a>
                <a href="#gallery" class="hover:opacity-40 transition">Curation</a>
                <a href="#" @click="isCartOpen = true" class="bg-white text-black px-4 py-2">Wishlist [{{cart.length}}]</a>
            </div>
        </nav>

        <section class="h-screen relative flex items-center justify-center">
            <div class="absolute left-0 w-1/2 h-full bg-[#E5E1D8] -z-10" data-aos="fade-right"></div>
            <div class="text-center" data-aos="zoom-in" data-aos-duration="2000">
                <span class="accent-font italic text-3xl text-stone-400 block mb-8">Evolution of Space.</span>
                <h1 class="text-7xl md:text-[12rem] font-bold leading-none tracking-tighter">木境<br><span class="md:pl-64 italic accent-font">REDEFINED</span></h1>
            </div>
        </section>

        <section id="about" class="py-40 container mx-auto px-10">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-20 items-center">
                <div class="md:col-span-6 photo-frame" data-aos="fade-up">
                    <img src="https://images.unsplash.com/photo-1581850518616-0819c3a242c7?q=80&w=1200" class="w-full h-[600px] object-cover grayscale hover:grayscale-0 transition-all duration-1000">
                </div>
                <div class="md:col-span-5 md:col-start-8" data-aos="fade-left">
                    <h2 class="text-5xl font-light mb-10 leading-tight">不只是複製品，<br>是關於『質地』的辯證。</h2>
                    <p class="text-stone-500 leading-loose text-sm tracking-widest mb-10">
                        我們讓 Agent 深入學習了超過 500 個高端室內設計案例。這一次，我們不再只是抄襲外殼，我們學會了如何利用空間的「呼吸」來突顯木材的天然紋理。
                    </p>
                    <div class="h-[1px] w-full bg-stone-300 mb-10"></div>
                    <span class="accent-font italic text-4xl opacity-20">01 / Aesthetic</span>
                </div>
            </div>
        </section>

        <section id="gallery" class="bg-white py-40">
            <div class="container mx-auto px-10">
                <div class="mb-32 flex justify-between items-end">
                    <h2 class="text-6xl font-bold accent-font italic">Curation.</h2>
                    <p class="text-xs tracking-[0.5em] text-stone-400">SELECT YOUR TEXTURE</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-16">
                    <div v-for="(p, idx) in products" :key="idx" 
                         class="group cursor-pointer" 
                         :class="idx === 1 ? 'md:mt-24' : ''"
                         data-aos="fade-up" :data-aos-delay="idx * 100">
                        <div class="reveal-box overflow-hidden mb-6">
                            <img :src="p.img" class="w-full h-[500px] object-cover group-hover:scale-110 transition duration-1000">
                        </div>
                        <div class="flex justify-between items-center">
                            <div>
                                <h4 class="text-xl font-bold">{{ p.name }}</h4>
                                <p class="text-xs text-stone-400 mt-1 uppercase tracking-widest">{{ p.type }}</p>
                            </div>
                            <button @click="addToCart(p.name)" class="w-10 h-10 border border-stone-200 rounded-full hover:bg-black hover:text-white transition flex items-center justify-center">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <aside :class="['fixed right-0 top-0 h-full w-full md:w-[500px] bg-[#F9F9F9] z-[70] p-20 transform transition-transform duration-1000 cubic-bezier(0.19, 1, 0.22, 1)', isCartOpen ? 'translate-x-0' : 'translate-x-full']">
            <h2 class="text-6xl font-bold accent-font italic mb-20">Cart.</h2>
            <div v-for="item in cart" class="py-6 border-b border-stone-200 tracking-widest">{{ item }}</div>
            <button class="mt-20 w-full py-6 bg-black text-white uppercase tracking-widest text-xs hover:bg-stone-800" @click="isCartOpen = false">Close</button>
        </aside>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const isCartOpen = ref(false);
                const cart = ref([]);
                const products = ref([
                    { name: '冰島白橡', type: 'Hardwood', img: 'https://images.unsplash.com/photo-1556020685-ae41abfc9365?q=80&w=1000' },
                    { name: '煙燻黑胡桃', type: 'Engineered', img: 'https://images.unsplash.com/photo-1505691938895-1758d7eaa511?q=80&w=1000' },
                    { name: '經典維也納', type: 'Herringbone', img: 'https://images.unsplash.com/photo-1516455590571-18256e5bb9ff?q=80&w=1000' }
                ]);
                const addToCart = (n) => { cart.value.push(n); isCartOpen.value = true; };
                return { isCartOpen, cart, products, addToCart };
            }
        }).mount('#app');
        AOS.init({ duration: 1500 });
    </script>
</body>
</html>
