<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匠心木境 | 專業木地板電商</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #FDFCFB; }
        .cart-slide { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="app">
        <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold tracking-tighter text-[#5D4037]">WOODSCAPE.</div>
            <div class="flex items-center space-x-8">
                <button @click="isCartOpen = true" class="relative text-gray-600 hover:text-brown-700">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span v-if="cart.length > 0" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">{{ cart.length }}</span>
                </button>
            </div>
        </nav>

        <header class="relative h-[60vh] flex items-center justify-center text-white bg-stone-800">
            <img src="https://images.unsplash.com/photo-1513519245088-0e12902e5a38?q=80&w=2070" class="absolute inset-0 w-full h-full object-cover opacity-60">
            <div class="relative z-10 text-center" data-aos="fade-up">
                <h1 class="text-5xl font-bold mb-4 tracking-widest">赤足巡禮，質感居家</h1>
                <p class="text-lg font-light opacity-90">為您的空間挑選最合適的木質基調</p>
            </div>
        </header>

        <main class="container mx-auto px-6 py-16">
            <div class="flex justify-center space-x-4 mb-12">
                <button v-for="cat in categories" :key="cat" 
                        @click="currentCategory = cat"
                        :class="['px-6 py-2 rounded-full border transition', currentCategory === cat ? 'bg-[#5D4037] text-white' : 'border-gray-200 text-gray-500 hover:border-[#5D4037]']">
                    {{ cat }}
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                <div v-for="product in filteredProducts" :key="product.id" 
                     class="bg-white rounded-lg overflow-hidden shadow-sm hover:shadow-xl transition-shadow duration-300 border border-gray-50"
                     data-aos="fade-up">
                    <div class="h-72 overflow-hidden relative group">
                        <img :src="product.image" class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
                        <div class="absolute top-4 right-4 bg-white/90 px-3 py-1 text-xs font-bold text-brown-800 rounded">
                            {{ product.price }} / 坪
                        </div>
                    </div>
                    <div class="p-6">
                        <span class="text-[10px] uppercase tracking-widest text-gray-400">{{ product.category }}</span>
                        <h3 class="text-xl font-bold mt-1 mb-3">{{ product.name }}</h3>
                        <button @click="addToCart(product)" 
                                class="w-full py-3 bg-[#F4F1EE] text-[#5D4037] font-bold hover:bg-[#5D4037] hover:text-white transition-colors duration-300">
                            加入清單
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <div v-if="isCartOpen" class="fixed inset-0 z-[60] bg-black/50" @click="isCartOpen = false"></div>
        <div :class="['fixed right-0 top-0 h-full w-full max-w-md bg-white z-[70] shadow-2xl p-8 transform transition-transform duration-300', isCartOpen ? 'translate-x-0' : 'translate-x-full']">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">預選清單</h2>
                <button @click="isCartOpen = false"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div v-if="cart.length === 0" class="text-gray-400 text-center py-20">您的清單是空的</div>
            <div v-else class="space-y-6">
                <div v-for="(item, index) in cart" :key="index" class="flex items-center space-x-4 border-b pb-4">
                    <img :src="item.image" class="w-20 h-20 object-cover rounded">
                    <div class="flex-1">
                        <h4 class="font-bold">{{ item.name }}</h4>
                        <p class="text-sm text-gray-500">{{ item.price }}</p>
                    </div>
                    <button @click="cart.splice(index, 1)" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                </div>
                <div class="pt-6">
                    <button class="w-full py-4 bg-[#5D4037] text-white font-bold tracking-widest hover:bg-[#4E342E]">
                        送出預約丈量要求
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const { createApp, ref, computed } = Vue;
        createApp({
            setup() {
                const isCartOpen = ref(false);
                const currentCategory = ref('全部');
                const categories = ['全部', '實木', '強化', '海島型'];
                const cart = ref([]);
                const products = ref([
                    { id: 1, name: '經典橡木實木', category: '實木', price: '$4,500', image: 'https://images.unsplash.com/photo-1556020685-ae41abfc9365?q=80&w=600' },
                    { id: 2, name: '北歐淺灰強化', category: '強化', price: '$2,800', image: 'https://images.unsplash.com/photo-1581850518616-0819c3a242c7?q=80&w=600' },
                    { id: 3, name: '深胡桃海島型', category: '海島型', price: '$3,900', image: 'https://images.unsplash.com/photo-1505691938895-1758d7eaa511?q=80&w=600' },
                    { id: 4, name: '人字拼古木', category: '實木', price: '$5,200', image: 'https://images.unsplash.com/photo-1516455590571-18256e5bb9ff?q=80&w=600' },
                    { id: 5, name: '抗磨柚木強化', category: '強化', price: '$3,200', image: 'https://images.unsplash.com/photo-1622397333309-3056049aa9bb?q=80&w=600' }
                ]);

                const filteredProducts = computed(() => {
                    return currentCategory.value === '全部' 
                        ? products.value 
                        : products.value.filter(p => p.category === currentCategory.value);
                });

                const addToCart = (product) => {
                    cart.value.push(product);
                    isCartOpen.value = true;
                };

                return { isCartOpen, currentCategory, categories, products, filteredProducts, cart, addToCart };
            }
        }).mount('#app');
        AOS.init();
    </script>
</body>
</html>
