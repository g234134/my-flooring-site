<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOODSCAPE | 融合美學</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&family=Noto+Serif+TC:wght@400;700&display=swap');
        
        :root { --accent: #8D6E63; --bg: #F5F2EE; }
        body { font-family: 'Noto Serif TC', serif; background-color: var(--bg); color: #2c2c2c; }
        .accent-font { font-family: 'Bodoni Moda', serif; }
        
        /* 融合美學 1：側邊垂直標題 (抄自高級雜誌) */
        .vertical-text { writing-mode: vertical-rl; text-orientation: mixed; }
        
        /* 融合美學 2：圖片懸浮拉伸感 */
        .reveal-box { position: relative; overflow: hidden; }
        .reveal-box img { transform: scale(1.1); transition: 1.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .reveal-box:hover img { transform: scale(1); }
    </style>
</head>
<body>
    <div id="app">
        <nav class="fixed top-0 w-full z-50 px-10 py-6 flex justify-between items-center mix-blend-difference text-white">
            <div class="text-xl font-bold tracking-[0.5em]">WS.STUDIO</div>
            <div class="flex space-x-8 text-[10px] tracking-widest">
                <a href="#" class="hover:line-through">INDEX</a>
                <a href="#" class="hover:line-through">PHILOSOPHY</a>
                <a href="#" @click="isCartOpen = true">WISHLIST [{{cart.length}}]</a>
            </div>
        </nav>

        <section class="h-screen relative flex items-center px-10 md:px-20">
            <div class="w-full md:w-2/3" data-aos="fade-right">
                <h1 class="text-7xl md:text-[10rem] leading-none font-bold accent-font italic mb-6">Nature's</h1>
                <h1 class="text-7xl md:text-[8rem] leading-none font-bold pl-20 md:pl-40 -mt-10">Whisper.</h1>
                <p class="mt-12 text-sm tracking-[0.4em] opacity-60">源自林間的低語，為您的空間鋪設詩意。</p>
            </div>
            <div class="absolute right-0 top-0 w-1/3 h-full overflow-hidden hidden md:block" data-aos="fade-left">
                <img src="https://images.unsplash.com/photo-1549187771-b4e9f0445b41?q=80&w=1974" class="w-full h-full object-cover">
            </div>
        </section>

        <section class="py-40">
            <div class="container mx-auto px-10 grid grid-cols-12 gap-4">
                <div class="col-span-12 md:col-span-8 reveal-box h-[500px]" data-aos="zoom-in">
                    <img src="https://images.unsplash.com/photo-1556020685-ae41abfc9365?q=80&w=1974" class="w-full h-full object-cover">
                    <div class="absolute top-10 left-10 text-white bg-black/20 p-4 backdrop-blur-sm">
                        <p class="text-xs tracking-widest">COLLECTION 01</p>
                        <h2 class="text-2xl mt-2 italic accent-font">Oceanic Oak</h2>
                    </div>
                </div>
                
                <div class="col-span-12 md:col-span-4 flex flex-col justify-end p-10 bg-white" data-aos="fade-up">
                    <h3 class="text-2xl font-bold mb-4">海島型工藝</h3>
                    <p class="text-gray-400 text-sm leading-loose mb-10">針對台灣潮濕環境設計，多層結構交叉疊合，有效抑制木材伸縮膨脹。</p>
                    <button @click="addToCart('海島型原木')" class="text-left font-bold border-b border-black w-max pb-2 hover:pl-4 transition-all">ADD TO LIST</button>
                </div>

                <div class="col-span-12 md:col-span-4 mt-20" data-aos="fade-right">
                     <div class="vertical-text text-gray-300 text-6xl font-bold opacity-30 accent-font">AESTHETICS</div>
                </div>

                <div class="col-span-12 md:col-span-8 mt-20 reveal-box h-[400px]" data-aos="fade-left">
                    <img src="https://images.unsplash.com/photo-1505691938895-1758d7eaa511?q=80&w=2070" class="w-full h-full object-cover">
                </div>
            </div>
        </section>

        <section class="bg-stone-900 text-white py-40 text-center">
            <div class="max-w-2xl mx-auto px-10" data-aos="fade-up">
                <span class="accent-font italic text-2xl text-stone-500 mb-8 block">Simplicity.</span>
                <h2 class="text-4xl md:text-5xl font-light leading-snug mb-12">簡單，卻充滿力量。</h2>
                <div class="h-[1px] w-20 bg-stone-700 mx-auto mb-12"></div>
                <p class="text-gray-400 leading-relaxed tracking-widest">
                    我們相信，地板是空間的底色。<br>
                    一個好的底色，能承載所有的生活瑣碎，並將之轉化為美。
                </p>
            </div>
        </section>

        <div v-if="isCartOpen" class="fixed inset-0 z-[70] bg-black/80 backdrop-blur-md" @click="isCartOpen = false"></div>
        <aside :class="['fixed right-0 top-0 h-full w-full md:w-[400px] bg-white z-[80] p-20 transform transition-transform duration-700', isCartOpen ? 'translate-x-0' : 'translate-x-full']">
             <h2 class="text-4xl font-bold accent-font italic mb-20">List.</h2>
             <div v-if="cart.length === 0" class="text-gray-300">Empty</div>
             <div v-for="item in cart" class="py-4 border-b text-sm tracking-widest">{{ item }}</div>
        </aside>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const isCartOpen = ref(false);
                const cart = ref([]);
                const addToCart = (p) => { cart.value.push(p); isCartOpen.value = true; };
                return { isCartOpen, cart, addToCart };
            }
        }).mount('#app');
        AOS.init({ duration: 2000, once: false });
    </script>
</body>
</html>
